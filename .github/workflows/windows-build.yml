name: Windows Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Package game
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/AstroDrift | Out-Null
          Copy-Item build/Release/AstroDrift.exe dist/AstroDrift/
          Copy-Item assets dist/AstroDrift/assets -Recurse

          if (Test-Path build/Release/openal32.dll) {
            Copy-Item build/Release/openal32.dll dist/AstroDrift/
          }

          Compress-Archive -Path dist/AstroDrift -DestinationPath dist/AstroDrift_Windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AstroDrift_Windows
          path: dist/AstroDrift_Windows.zip
